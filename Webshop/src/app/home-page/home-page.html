<app-nav-bar/>

<div class="page">
  <div class="filters">
    <div>
      <label>Kategória</label>
      <select [(ngModel)]="selectedCategory">
        <option value="">↓</option>
        <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.name }}</option>
      </select>
    </div>
    <div>
      <label>Modell</label>
      <select [(ngModel)]="selectedModel">
        <option value="">↓</option>
        <option *ngFor="let m of models" [value]="m.id">{{ m.name }}</option>
      </select>
    </div>
    <div>
      <label>Vételár</label>
      <div class="range">
        <input type="number" placeholder="-tól" [(ngModel)]="minPrice">
        <input type="number" placeholder="-ig" [(ngModel)]="maxPrice">
      </div>
    </div>
    <button class="btn orange search" (click)="search()">Keresés</button>
  </div>

  <h3>Kiemelt hirdetések:</h3>

  <div class="product-container">
    <div *ngIf="products.length === 0" class="no-products">
      <p>Nincsenek elérhető termékek...</p>
    </div>

    <div *ngFor="let product of products" class="product" [routerLink]="['/product', product.id]" style="cursor: pointer;">
      <img [src]="product.imageUrl" [alt]="product.name">
      <div class="text">
        <p><strong>{{ product.name }}</strong></p>
        <p>{{ product.description }}</p>
        <p>Ár: {{ product.price }} Ft</p>
      </div>
      <div class="cart-actions" (click)="$event.stopPropagation()">
        <div class="quantity-row">
          <button class="qty-btn" (click)="decreaseQuantity(product, $event)">-</button>
          <span>{{ product.quantity }}</span>
          <button class="qty-btn" (click)="increaseQuantity(product, $event)">+</button>
        </div>
        <button (click)="onAddToCart(product, $event)" class="btn orange">Kosárba</button>
      </div>
    </div>
  </div>
</div>
