<app-nav-bar/>

<div class="page">
  <h2>Kedvencek</h2>

  <div *ngIf="favorites.length === 0" class="empty">
    <p>Nincsenek kedvenc termékeid.</p>
  </div>

  <div class="product-container">
    <div class="favorite-item" *ngFor="let item of favorites" [routerLink]="['/product', item.id]" style="cursor: pointer;">
      <img [src]="item.imageUrl" [alt]="item.name">
      <div class="text">
        <p><strong>{{ item.name }}</strong></p>
        <p>Ár: {{ item.price }} Ft</p>
      </div>
      <button class="remove-btn" (click)="removeFromFavorites(item); $event.stopPropagation()">Törlés</button>
    </div>
  </div>
</div>
