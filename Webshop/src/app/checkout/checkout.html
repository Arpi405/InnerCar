<app-nav-bar/>

<div class="page">
  <div class="checkout-container">
    <div class="field">
      <label>Teljes név:</label>
      <input type="text" [(ngModel)]="name" placeholder="Pl. Kovács János">
    </div>

    <div class="field">
      <label>Email cím:</label>
      <input type="email" [(ngModel)]="email" placeholder="Pl. pelda@gmail.com">
    </div>

    <div class="field">
      <label>Cím:</label>
      <input type="text" [(ngModel)]="address" placeholder="Pl. Budapest, Fő utca 1.">
    </div>

    <div class="field">
      <label>Telefonszám:</label>
      <input type="text" [(ngModel)]="phone" placeholder="Pl. +36 30 123 4567">
    </div>

    <div class="field">
      <label>Az Összeg:</label>
      <input type="text" [value]="total + ' Ft'" readonly>
    </div>

    <div class="field">
      <label>Fizetési eszközök:</label>
      <select [(ngModel)]="selectedPayment">
        <option value="">↓</option>
        <option value="card">Bankkártya</option>
        <option value="cash">Készpénz</option>
        <option value="transfer">Átutalás</option>
      </select>
    </div>

    <div class="bottom-row">
      <button class="pay-btn" (click)="pay()">Fizetés</button>
    </div>
  </div>
</div>
