<app-nav-bar/>

<div class="page">
  <div class="profile-container">
    <div class="avatar-section">
      <div class="avatar-box">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#e5ecf3" width="100" height="100">
          <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
        </svg>
      </div>
    </div>
    <div class="favorites-section">
      <h3>Kedvencek:</h3>
      <div *ngIf="favorites.length === 0" class="no-favorites">
        <p>Nincsenek kedvenc termékeid.</p>
      </div>
      <div class="favorite-item" *ngFor="let item of favorites">
        <img [src]="item.imageUrl" [alt]="item.name">
        <div class="text">
          <p><strong>{{ item.name }}</strong></p>
          <p>Ár: {{ item.price }} Ft</p>
        </div>
        <button class="remove-btn" (click)="removeFromFavorites(item)">Törlés</button>
      </div>
    </div>
  </div>
</div>
