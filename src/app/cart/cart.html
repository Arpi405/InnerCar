<app-nav-bar/>

<div class="page">
  <h2>Kosár:</h2>

  <div *ngIf="items.length === 0" class="empty">
    A kosár üres
  </div>

  <div class="cart-item" *ngFor="let item of items">
    <img [src]="item.image" [alt]="item.name">
    <div class="cart-item-details">
      <p><strong>{{ item.name }}</strong></p>
      <p>Ár: {{ item.price }} Ft</p>
      <div class="quantity-row">
        <button class="qty-btn" (click)="decreaseQuantity(item)">-</button>
        <span>{{ item.quantity }} db</span>
        <button class="qty-btn" (click)="increaseQuantity(item)">+</button>
      </div>
    </div>
    <button class="remove-btn" (click)="removeFromCart(item)">Eltávolítás</button>
  </div>

  <div class="bottom-row">
    <span class="total">Összesen: {{ total }} Ft</span>
    <button class="continue-btn" (click)="checkout()" [disabled]="items.length === 0">Tovább a fizetéshez</button>
  </div>
</div>
